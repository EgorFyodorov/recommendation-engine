name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync --locked --extra dev --extra modeling

      - name: Generate protobuf bindings
        run: make proto

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Export and verify ONNX
        run: |
          make export
          make verify

      - name: Build Docker image
        run: docker build -t recommendation-engine:test .
